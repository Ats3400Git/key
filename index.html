<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Alpha-Step Maker</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0a; font-family: 'Courier New', Courier, monospace; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #00ff00;
            font-size: 20px; pointer-events: none; text-shadow: 2px 2px 2px #000;
        }
        .energy-bar { width: 200px; height: 15px; background: #333; border: 1px solid #555; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: #00ff00; transition: width 0.1s; }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 32px; text-align: center; display: none; background: rgba(0,0,0,0.8); padding: 20px;
        }
    </style>
</head>
<body>

<div id="ui">
    SCORE: <span id="score">0</span><br>
    TYPE ENERGY
    <div class="energy-bar"><div id="energy-fill"></div></div>
    <div style="font-size: 12px; color: #888; margin-top: 5px;">Type ANY Alphabet to Create Steps!</div>
</div>
<div id="msg">GAME OVER<br><span style="font-size:18px;">Press SPACE to Restart</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const energyEl = document.getElementById('energy-fill');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, energy = 100, gameOver = false;
let platforms = []; // 入力された文字足場
let coins = [];
const player = { x: 100, y: 300, vx: 3, vy: 0, radius: 15, gravity: 0.4 };

// コインの初期配置
function initCoins() {
    coins = [];
    for(let i=0; i<50; i++) {
        coins.push({ x: 400 + i * 300, y: 200 + Math.random() * 300, collected: false });
    }
}
initCoins();

// キー入力で足場生成
window.addEventListener('keydown', (e) => {
    if(gameOver) { if(e.code === 'Space') restart(); return; }
    
    const char = e.key.toUpperCase();
    if(/^[A-Z]$/.test(char) && energy >= 15) {
        energy -= 15;
        // キャラクターの少し先に足場を生成
        platforms.push({
            char: char,
            x: player.x + 40,
            y: player.y + 40,
            w: 60,
            h: 40,
            life: 200 // 寿命（フレーム数）
        });
    }
});

function restart() {
    score = 0; energy = 100; gameOver = false;
    player.x = 100; player.y = 300; player.vx = 3; player.vy = 0;
    platforms = [];
    initCoins();
    msgEl.style.display = 'none';
}

function update() {
    if(gameOver) return;

    energy = Math.min(100, energy + 0.1); // 自然回復
    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // 足場との判定
    platforms.forEach(p => {
        p.life--;
        // 簡易当たり判定
        if(player.vx >= 0 && player.vy > 0 &&
           player.x > p.x - 15 && player.x < p.x + p.w + 15 &&
           player.y + player.radius > p.y && player.y + player.radius < p.y + 20) {
            player.y = p.y - player.radius;
            player.vy = -10; // 踏むと跳ねる
            score += 10;
        }
    });
    platforms = platforms.filter(p => p.life > 0); // 消えた足場を削除

    // コイン回収
    coins.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 40) {
            c.collected = true;
            energy = Math.min(100, energy + 30);
            score += 100;
        }
    });

    if(player.y > canvas.height) {
        gameOver = true;
        msgEl.style.display = 'block';
    }

    scoreEl.innerText = score;
    energyEl.style.width = energy + "%";
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.save();
    ctx.translate(-player.x + 100, 0);

    // コイン描画
    ctx.fillStyle = "#ff0";
    coins.forEach(c => {
        if(!c.collected) {
            ctx.beginPath(); ctx.arc(c.x, c.y, 10, 0, Math.PI*2); ctx.fill();
        }
    });

    // 足場（文字）描画
    platforms.forEach(p => {
        const alpha = p.life / 200;
        ctx.fillStyle = `rgba(0, 255, 255, ${alpha})`;
        ctx.font = "bold 50px sans-serif";
        ctx.fillText(p.char, p.x, p.y + 40);
        // 足場の当たり判定可視化（オプション）
        ctx.strokeStyle = `rgba(0, 255, 255, ${alpha * 0.3})`;
        ctx.strokeRect(p.x, p.y, p.w, p.h);
    });

    // プレイヤー（ミニチュア人間）
    ctx.fillStyle = "#fff";
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2);
    ctx.fill();
    // 進行方向への目
    ctx.fillStyle = "#000";
    ctx.fillRect(player.x + 6, player.y - 5, 4, 4);

    ctx.restore();

    update();
    requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
