<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gravity Maze Extreme</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas { background: #000; }
</style>
</head>
<body>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let ball = { x: 30, y: 30, vx: 0, vy: 0, r: 7 };
let gravity = { x: 0, y: 0.3 };

// 外枠＋超複雑迷路
let walls = [
  {x:0,y:0,w:500,h:10},{x:0,y:490,w:500,h:10},{x:0,y:0,w:10,h:500},{x:490,y:0,w:10,h:500},

  // 縦壁
  {x:50,y:0,w:10,h:450},
  {x:100,y:50,w:10,h:450},
  {x:150,y:0,w:10,h:400},
  {x:200,y:100,w:10,h:400},
  {x:250,y:0,w:10,h:450},
  {x:300,y:50,w:10,h:450},
  {x:350,y:0,w:10,h:400},
  {x:400,y:100,w:10,h:400},

  // 横壁
  {x:0,y:80,w:220,h:10},
  {x:180,y:140,w:320,h:10},
  {x:0,y:200,w:220,h:10},
  {x:180,y:260,w:320,h:10},
  {x:0,y:320,w:220,h:10},
  {x:180,y:380,w:320,h:10},

  // 行き止まり・罠
  {x:60,y:300,w:80,h:10},
  {x:120,y:220,w:80,h:10},
  {x:260,y:300,w:80,h:10},
  {x:320,y:220,w:80,h:10},

  // 迷わせる細かい壁
  {x:80,y:120,w:40,h:10},
  {x:180,y:60,w:40,h:10},
  {x:280,y:180,w:40,h:10},
  {x:380,y:300,w:40,h:10}
];

// 動く壁（通路封鎖用）
let movingWalls = [
  {x:70,y:160,w:80,h:10,vx:2},
  {x:260,y:340,w:80,h:10,vx:-2}
];

let goal = { x: 470, y: 470, r: 12 };

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") gravity = { x: 0, y: -0.3 };
  if (e.key === "ArrowDown") gravity = { x: 0, y: 0.3 };
  if (e.key === "ArrowLeft") gravity = { x: -0.3, y: 0 };
  if (e.key === "ArrowRight") gravity = { x: 0.3, y: 0 };
});

function update() {
  ball.vx += gravity.x;
  ball.vy += gravity.y;

  ball.x += ball.vx;
  ball.y += ball.vy;

  // 外枠
  if (ball.x < ball.r) { ball.x = ball.r; ball.vx *= -0.5; }
  if (ball.x > 500-ball.r) { ball.x = 500-ball.r; ball.vx *= -0.5; }
  if (ball.y < ball.r) { ball.y = ball.r; ball.vy *= -0.5; }
  if (ball.y > 500-ball.r) { ball.y = 500-ball.r; ball.vy *= -0.5; }

  walls.forEach(w => collide(w));

  movingWalls.forEach(w => {
    w.x += w.vx;
    if (w.x < 50 || w.x > 350) w.vx *= -1;
    collide(w);
  });

  let dx = ball.x - goal.x;
  let dy = ball.y - goal.y;
  if (Math.sqrt(dx*dx + dy*dy) < goal.r) {
    alert("クリア！");
    reset();
  }
}

function collide(w){
  if (
    ball.x > w.x &&
    ball.x < w.x + w.w &&
    ball.y > w.y &&
    ball.y < w.y + w.h
  ) {
    ball.vx *= -0.6;
    ball.vy *= -0.6;
  }
}

function reset(){
  ball.x = 30;
  ball.y = 30;
  ball.vx = 0;
  ball.vy = 0;
  gravity = {x:0,y:0.3};
}

function draw(){
  ctx.clearRect(0,0,500,500);

  ctx.fillStyle="white";
  walls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

  ctx.fillStyle="yellow";
  movingWalls.forEach(w=>ctx.fillRect(w.x,w.y,w.w,w.h));

  ctx.fillStyle="green";
  ctx.beginPath();
  ctx.arc(goal.x,goal.y,goal.r,0,Math.PI*2);
  ctx.fill();

  ctx.fillStyle="red";
  ctx.beginPath();
  ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);
  ctx.fill();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
