<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Lava Alpha-Climber</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial Black', sans-serif; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: #fff;
            font-size: 28px; pointer-events: none; z-index: 100;
            text-shadow: 2px 2px 4px #000;
        }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff4400; font-size: 50px; text-align: center; display: none; z-index: 200;
            background: rgba(0,0,0,0.8); padding: 30px; border: 4px solid #ff4400;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="ui">HEIGHT: <span id="score">0</span>m</div>
<div id="msg">MELTED...<br><span style="font-size:20px; color:#fff;">Press Any Key to Restart</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, gameOver = false, camY = 0;
let lavaY = canvas.height + 200; // 溶岩の初期位置
let lavaSpeed = 1.5; // 溶岩の上昇速度
let steps = [];
const player = { x: canvas.width/2, y: canvas.height - 150, radius: 15 };

function init() {
    score = 0; gameOver = false; camY = 0;
    lavaY = canvas.height + 200;
    lavaSpeed = 1.5;
    player.x = canvas.width/2;
    player.y = canvas.height - 150;
    // 最初の足場
    steps = [{ char: "GO!", x: canvas.width/2 - 80, y: canvas.height - 100, hue: 180 }];
    msgEl.style.display = 'none';
}

window.addEventListener('keydown', (e) => {
    if(gameOver) { init(); return; }
    const char = e.key.toUpperCase();
    if(/^[A-Z0-9]$/.test(char)) {
        const newStep = {
            char: char,
            x: Math.random() * (canvas.width - 200) + 100,
            y: player.y - 180, // 次の足場までの高さ
            hue: Math.random() * 360
        };
        steps.push(newStep);
        
        // 文字の上へ移動
        player.x = newStep.x;
        player.y = newStep.y;
        
        // スコア更新と溶岩の加速
        score = Math.floor((canvas.height - 150 - player.y) / 10);
        lavaSpeed += 0.05; 
    }
});

function draw(time) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if(!gameOver) {
        lavaY -= lavaSpeed; // 溶岩の上昇
        if(player.y > lavaY - 20) gameOver = true; // 接触判定
    }

    // カメラの追従
    let targetCamY = canvas.height * 0.7 - player.y;
    camY += (targetCamY - camY) * 0.1;

    ctx.save();
    ctx.translate(0, camY);

    // 背景のグリッド（高さの目安）
    ctx.strokeStyle = "#222";
    for(let i=0; i<20000; i+=200) {
        ctx.beginPath(); ctx.moveTo(0, canvas.height - i); ctx.lineTo(canvas.width, canvas.height - i); ctx.stroke();
    }

    // 足場（巨大文字）の描画
    ctx.textAlign = "center";
    steps.forEach(s => {
        ctx.fillStyle = `hsla(${s.hue}, 80%, 60%, 1)`;
        ctx.shadowBlur = 20;
        ctx.shadowColor = `hsla(${s.hue}, 80%, 50%, 0.8)`;
        ctx.font = "900 120px 'Arial Black'";
        ctx.fillText(s.char, s.x, s.y);
        ctx.shadowBlur = 0;
    });

    // プレイヤー（ミニチュア人間）
    ctx.fillStyle = "#fff";
    ctx.shadowBlur = 15;
    ctx.shadowColor = "#fff";
    ctx.beginPath(); ctx.arc(player.x, player.y - 40, player.radius, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // 溶岩の描画（波打つアニメーション）
    ctx.fillStyle = "#ff4400";
    ctx.beginPath();
    ctx.moveTo(0, lavaY);
    for(let x=0; x<=canvas.width; x+=20) {
        let wave = Math.sin(x * 0.02 + time * 0.005) * 20;
        ctx.lineTo(x, lavaY + wave);
    }
    ctx.lineTo(canvas.width, lavaY + 2000);
    ctx.lineTo(0, lavaY + 2000);
    ctx.fill();
    
    // 溶岩の照り返し
    ctx.fillStyle = "rgba(255, 68, 0, 0.3)";
    ctx.fillRect(0, lavaY - 20, canvas.width, 20);

    ctx.restore();

    if(gameOver) msgEl.style.display = 'block';
    scoreEl.innerText = score;
    requestAnimationFrame(draw);
}

init();
requestAnimationFrame(draw);
</script>
</body>
</html>
