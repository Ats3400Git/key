<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Desk-Top Tiny Runner - Balanced</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Courier New', Courier, monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 20px; left: 20px; color: white;
            font-size: 20px; pointer-events: none; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 8px;
        }
        .energy-bar { width: 250px; height: 15px; background: #333; border: 1px solid #777; margin-top: 5px; }
        #energy-fill { width: 100%; height: 100%; background: #00ffcc; transition: width 0.1s; }
        #msg {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #ff3366; font-size: 40px; text-align: center; display: none; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui">
    SCORE: <span id="score">0</span><br>
    ENERGY (AUTO RECHARGE)
    <div class="energy-bar"><div id="energy-fill"></div></div>
    <div style="font-size:12px; margin-top:5px; color:#aaa;">Q-P: High/High-Cost | A-L: Mid/Mid-Cost | Z-M: Low/Low-Cost</div>
</div>
<div id="msg">GAME OVER<br><span style="font-size:18px; color:white;">Press SPACE to Restart</span></div>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const energyEl = document.getElementById('energy-fill');
const msgEl = document.getElementById('msg');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0, energy = 100, gameOver = false, gameWin = false;

// キーボード設定
const alphabet = "QWERTYUIOPASDFGHJKLZXCVBNM";
const rows = [alphabet.slice(0,10), alphabet.slice(10,19), alphabet.slice(19,26)];
const keys = {};

rows.forEach((row, rowIndex) => {
    row.split('').forEach((char, i) => {
        keys[char] = {
            baseX: i * 90 + 50 + (rowIndex * 30),
            y: 350 + rowIndex * 100, // 段ごとに高さを変える
            w: 80, h: 60,
            cost: [15, 10, 5][rowIndex], // 上段ほど高い
            jump: [-16, -13, -10][rowIndex], // 上段ほど高く跳ねる
            active: false, timer: 0
        };
    });
});

const player = { x: 100, y: 300, vx: 3.5, vy: 0, radius: 12, gravity: 0.45 };
const coins = [];
for(let i=0; i<40; i++) {
    coins.push({
        x: 600 + i * 250, 
        y: 350 + Math.floor(Math.random() * 3) * 100 - 30, // 各行のキーの少し上に配置
        collected: false
    });
}
const goalX = 10000;

window.addEventListener('keydown', (e) => {
    if(gameOver || gameWin) { if(e.code === 'Space') restart(); return; }
    const char = e.key.toUpperCase();
    if(keys[char] && energy >= keys[char].cost) {
        keys[char].active = true;
        keys[char].timer = 45; 
        energy -= keys[char].cost;
    }
});

function restart() {
    score = 0; energy = 100; gameOver = false; gameWin = false;
    player.x = 100; player.y = 300; player.vx = 3.5; player.vy = 0;
    coins.forEach(c => c.collected = false);
    msgEl.style.display = 'none';
}

function update() {
    if(gameOver || gameWin) return;

    // 自然回復
    energy = Math.min(100, energy + 0.15); 
    player.vy += player.gravity;
    player.x += player.vx;
    player.y += player.vy;

    // 足場判定
    for(let char in keys) {
        let k = keys[char];
        if(k.timer > 0) { k.timer--; if(k.timer <= 0) k.active = false; }
        
        if(k.active) {
            // 現在のスクロール位置に合わせたキーの位置を計算
            let loopX = Math.floor(player.x / 1200) * 1200;
            for(let off of [-1200, 0, 1200]) {
                let actualX = k.baseX + loopX + off;
                if(player.x > actualX - 10 && player.x < actualX + k.w + 10 &&
                   player.y + player.radius > k.y && player.y + player.radius < k.y + 30 && player.vy > 0) {
                    player.y = k.y - player.radius;
                    player.vy = k.jump;
                }
            }
        }
    }

    coins.forEach(c => {
        if(!c.collected && Math.hypot(player.x - c.x, player.y - c.y) < 40) {
            c.collected = true; score += 100; energy = Math.min(100, energy + 15);
        }
    });

    scoreEl.innerText = score;
    energyEl.style.width = energy + "%";
    if(player.y > canvas.height + 100) { gameOver = true; msgEl.style.display = 'block'; }
    if(player.x > goalX) { gameWin = true; msgEl.innerHTML = "GOAL!<br><span style='font-size:18px; color:white;'>Press SPACE to Play Again</span>"; msgEl.style.display = 'block'; }
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.save();
    ctx.translate(-player.x + 150, 0);

    // キーの描画
    for(let char in keys) {
        let k = keys[char];
        let loopX = Math.floor(player.x / 1200) * 1200;
        for(let off of [-1200, 0, 1200]) {
            let actualX = k.baseX + loopX + off;
            ctx.fillStyle = k.active ? "#00ffcc" : "#444";
            ctx.shadowBlur = k.active ? 15 : 0;
            ctx.shadowColor = "#00ffcc";
            ctx.fillRect(actualX, k.y, k.w, k.h);
            ctx.fillStyle = k.active ? "#000" : "#888";
            ctx.font = "bold 20px sans-serif";
            ctx.fillText(char, actualX + 30, k.y + 35);
        }
    }

    // コイン
    ctx.fillStyle = "#ffd700";
    ctx.shadowBlur = 10;
    coins.forEach(c => {
        if(!c.collected) {
            ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI*2); ctx.fill();
        }
    });
    ctx.shadowBlur = 0;

    // ゴール
    ctx.fillStyle = "#ff3366";
    ctx.fillRect(goalX, 200, 20, 600);

    // キャラクター
    ctx.fillStyle = "white";
    ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = "#333";
    ctx.fillRect(player.x + 4, player.y - 6, 4, 4); // 目

    ctx.restore();
    update();
    requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
