<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Gravity Maze</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  canvas {
    background: #000;
  }
</style>
</head>
<body>

<canvas id="game" width="500" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ボール
let ball = {
  x: 50,
  y: 50,
  vx: 0,
  vy: 0,
  r: 10
};

// 重力
let gravity = { x: 0, y: 0.3 };

// 壁（迷路）
let walls = [
  { x: 100, y: 0, w: 20, h: 350 },
  { x: 200, y: 150, w: 20, h: 350 },
  { x: 300, y: 0, w: 20, h: 350 }
];

// 動く壁（トラップ）
let movingWall = {
  x: 150,
  y: 200,
  w: 100,
  h: 20,
  vx: 2
};

// ゴール
let goal = { x: 450, y: 450, r: 15 };

// 操作（重力変更）
document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp") gravity = { x: 0, y: -0.3 };
  if (e.key === "ArrowDown") gravity = { x: 0, y: 0.3 };
  if (e.key === "ArrowLeft") gravity = { x: -0.3, y: 0 };
  if (e.key === "ArrowRight") gravity = { x: 0.3, y: 0 };
});

// 更新処理
function update() {
  // 重力適用
  ball.vx += gravity.x;
  ball.vy += gravity.y;

  ball.x += ball.vx;
  ball.y += ball.vy;

  // 画面端
  if (ball.x < ball.r) { ball.x = ball.r; ball.vx *= -0.5; }
  if (ball.x > 500 - ball.r) { ball.x = 500 - ball.r; ball.vx *= -0.5; }
  if (ball.y < ball.r) { ball.y = ball.r; ball.vy *= -0.5; }
  if (ball.y > 500 - ball.r) { ball.y = 500 - ball.r; ball.vy *= -0.5; }

  // 壁衝突
  walls.forEach(w => collideRect(w));

  // 動く壁更新
  movingWall.x += movingWall.vx;
  if (movingWall.x < 100 || movingWall.x > 300) {
    movingWall.vx *= -1;
  }

  collideRect(movingWall);

  // ゴール判定
  let dx = ball.x - goal.x;
  let dy = ball.y - goal.y;
  if (Math.sqrt(dx * dx + dy * dy) < goal.r) {
    alert("クリア！");
    reset();
  }
}

// 矩形衝突
function collideRect(w) {
  if (
    ball.x > w.x &&
    ball.x < w.x + w.w &&
    ball.y > w.y &&
    ball.y < w.y + w.h
  ) {
    // 簡易反射
    ball.vx *= -0.7;
    ball.vy *= -0.7;
  }
}

// リセット
function reset() {
  ball.x = 50;
  ball.y = 50;
  ball.vx = 0;
  ball.vy = 0;
  gravity = { x: 0, y: 0.3 };
}

// 描画
function draw() {
  ctx.clearRect(0, 0, 500, 500);

  // 壁
  ctx.fillStyle = "white";
  walls.forEach(w => ctx.fillRect(w.x, w.y, w.w, w.h));

  // 動く壁
  ctx.fillStyle = "yellow";
  ctx.fillRect(movingWall.x, movingWall.y, movingWall.w, movingWall.h);

  // ゴール
  ctx.fillStyle = "green";
  ctx.beginPath();
  ctx.arc(goal.x, goal.y, goal.r, 0, Math.PI * 2);
  ctx.fill();

  // ボール
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
}

// ループ
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
